name: '📅 Gemini Scheduled Bug Verify'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  get-issues:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.list_issues.outputs.issues }}
    steps:
      - name: 'List open bug issues'
        id: 'list_issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |-
          ISSUES="$(gh issue list \
            --label "bug" \
            --state open \
            --json number,title,body,url \
            --limit 100 \
            --repo "${GITHUB_REPOSITORY}" \
            --jq 'map({number, title, body, url})' \
          | jq -c '.'
          )"
          echo "issues=${ISSUES}" >> "${GITHUB_OUTPUT}"

  verify-bug:
    needs: get-issues
    if: needs.get-issues.outputs.issues != '[]'
    strategy:
      matrix:
        issue: ${{ fromJson(needs.get-issues.outputs.issues) }}
      fail-fast: false
      max-parallel: 1
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: 'Run Gemini Merge Verification'
        id: 'gemini_verify'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
          ISSUE_BODY: ${{ matrix.issue.body }}
          ISSUE_URL: ${{ matrix.issue.url }}
          GEMINI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          workflow_name: 'gemini-bug-verify'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "tools": {
                "core": [
                  "run_shell_command(echo)",
                  "run_shell_command(gh)",
                  "run_shell_command(jq)"
                ]
              }
            }
          prompt: '/gemini-bug-verify'

      - name: 'Close merged bug issue'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          AI_OUTPUT: ${{ steps.gemini_verify.outputs.output }}
        run: |-
          ACTION=$(echo "$AI_OUTPUT" | grep "^action:" | cut -d' ' -f2 | tr -d '\r')
          COMMENT=$(echo "$AI_OUTPUT" | sed -n '/comment:/,$p' | sed '1d')

          if [ "$ACTION" == "close_and_comment" ]; then
            gh issue close "$ISSUE_NUMBER" \
              --repo "$REPOSITORY" \
              --reason "completed" \
              --comment "$COMMENT"
          else
            echo "No merged fix evidence found for issue #${ISSUE_NUMBER}."
          fi
