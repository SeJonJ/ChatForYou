name: '📅 Gemini Scheduled Bug Verify'

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  get-issues:
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.list_issues.outputs.issues }}
    steps:
      - name: 'List open bug issues'
        id: 'list_issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |-
          ISSUES="$(gh issue list \
            --label "bug" \
            --state open \
            --json number,title,body,url \
            --limit 20 \
            --repo "${GITHUB_REPOSITORY}" \
            --jq 'map({number, title, body, url})' \
          | jq -c '.'
          )"
          echo "issues=${ISSUES}" >> "${GITHUB_OUTPUT}"

  verify-bug:
    needs: get-issues
    if: needs.get-issues.outputs.issues != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: 'Run Gemini Merge Verification'
        id: 'gemini_verify'
        continue-on-error: true
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BUG_ISSUES: ${{ needs.get-issues.outputs.issues }}
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          workflow_name: 'gemini-bug-verify'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 50
              },
              "tools": {
                "core": [
                  "run_shell_command(echo)",
                  "run_shell_command(gh)",
                  "run_shell_command(jq)"
                ]
              }
            }
          prompt: '/gemini-bug-verify'

      - name: 'Close merged bug issue'
        if: |-
          ${{ steps.gemini_verify.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          AI_OUTPUT: ${{ steps.gemini_verify.outputs.output }}
        run: |-
          ACTIONS="$(echo "$AI_OUTPUT" | sed -e 's/^```json$//' -e 's/^```$//' | jq -c '.')"

          echo "$ACTIONS" | jq -c '.[] | select(.action == "close_and_comment")' | while read -r item; do
            ISSUE_NUMBER="$(echo "$item" | jq -r '.issue_number')"
            COMMENT="$(echo "$item" | jq -r '.comment')"
            gh issue close "${ISSUE_NUMBER}" \
              --repo "$REPOSITORY" \
              --reason "completed" \
              --comment "$COMMENT"
          done

      - name: 'Skip bug verification after Gemini failure'
        if: |-
          ${{ steps.gemini_verify.outcome != 'success' }}
        run: |-
          echo "Gemini merge verification skipped because the Gemini step failed or quota was exhausted."
