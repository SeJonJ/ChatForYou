name: 'Hook Regression Tests'

on:
  push:
    paths:
      - '.claude/hooks/**'
      - '.codex/hooks/**'
      - 'scripts/verify-changes.sh'
      - 'scripts/verify-committed-tree.sh'
      - 'scripts/verify-doc-mapping.sh'
      - 'scripts/test-verify-*.sh'
      - 'hooks/**'
  pull_request:
    paths:
      - '.claude/hooks/**'
      - '.codex/hooks/**'
      - 'scripts/verify-changes.sh'
      - 'scripts/verify-committed-tree.sh'
      - 'scripts/verify-doc-mapping.sh'
      - 'scripts/test-verify-*.sh'
      - 'hooks/**'
  workflow_dispatch:

jobs:
  hook-regression:
    name: 'Claude Hook Regression (22 cases)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Run hook regression tests'
        run: |
          bash .claude/hooks/tests/run-tests.sh

  codex-hook-regression:
    name: 'Codex Hook Regression (23 cases)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Run Codex hook regression tests'
        run: |
          bash .codex/hooks/tests/run-tests.sh

  verify-smoke:
    name: 'verify gates Smoke (changes + committed-tree + doc-mapping)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Run verify-changes smoke tests'
        run: |
          bash scripts/test-verify-changes.sh

      - name: 'Run verify-committed-tree smoke tests'
        run: |
          bash scripts/test-verify-committed-tree.sh

      - name: 'Run verify-doc-mapping smoke tests'
        run: |
          bash scripts/test-verify-doc-mapping.sh
