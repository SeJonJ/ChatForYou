<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <defs>
    <linearGradient id="stopGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc3545;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowStop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="5" y="5" width="14" height="14" rx="2" ry="2" fill="url(#stopGradient)" stroke="#000000" stroke-width="1.5" filter="url(#shadowStop)"/>
  <rect x="8" y="8" width="8" height="8" rx="1" ry="1" fill="#ffffff" opacity="0.3"/>
</svg>