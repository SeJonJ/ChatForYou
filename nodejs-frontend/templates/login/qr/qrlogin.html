<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR 코드 로그인</title>
    <base href="/chatforyou/">
    
    <script src="static/vendor/jquery/jquery-3.2.1.min.js"></script>
    <!-- QR 코드 생성 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        /**
         * 인터넷에서 대충 주어왔습니다
         * 보시구 맘에 안드시면 싹 지워주세요!
         */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .qr-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        #qr-code-area {
            margin: 30px auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: inline-block;
            min-height: 296px;
            min-width: 296px;
        }

        #status-message {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .status-pending {
            background: #cfe2ff;
            color: #084298;
            border: 1px solid #9ec5fe;
        }

        .status-success {
            background: #d1f2eb;
            color: #0f5132;
            border: 1px solid #a7e1d4;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f1aeb5;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .timer {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        #polling-indicator {
            display: none;
            margin-top: 15px;
            font-size: 13px;
            color: #667eea;
        }

        .dot-pulse::after {
            content: '...';
            animation: dot-pulse 1.5s infinite;
        }

        @keyframes dot-pulse {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .instructions {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 13px;
            color: #666;
        }

        .instructions ol {
            padding-left: 20px;
            margin: 10px 0 0 0;
        }

        .instructions li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>🔐 QR 코드 로그인</h1>
        <p class="subtitle">모바일 기기로 QR 코드를 스캔하세요</p>
        
        <div class="instructions" id="instructions">
            <strong>📱 로그인 방법</strong>
            <ol>
                <li>모바일 카메라로 아래 QR 코드를 스캔하세요</li>
                <li>구글 계정으로 로그인하세요</li>
                <li>앱에서 자동으로 로그인됩니다</li>
            </ol>
        </div>
        
        <div id="qr-code-area">
            <div class="spinner" id="initial-spinner"></div>
        </div>
        
        <div id="status-message" class="status-pending">
            QR 코드 생성 중...
        </div>
        
        <div id="polling-indicator">
            인증 대기 중<span class="dot-pulse"></span>
        </div>
        
        <div class="timer" id="timer">유효 시간: 5:00</div>
        
        <div class="button-group">
            <button class="btn btn-secondary" id="cancelBtn">취소</button>
            <button class="btn btn-primary" id="retryBtn" style="display:none;">다시 시도</button>
        </div>
    </div>
    <script src="config/config.js"></script>
    <script src="js/common/ajaxUtil.js"></script>
    <script src="static/js/login/qr/qrlogin.js"></script>
</body>
</html>
