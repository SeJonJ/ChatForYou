<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatForYou QR 스캔 로그인</title>
    <base href="/chatforyou/">
    
    <!-- Firebase SDK -->
    <script src="static/vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth.js"></script>
    <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.2/firebase-ui-auth.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        #firebaseui-auth-container {
            margin: 20px 0;
        }
        
        #status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .status-success {
            background: #d1f2eb;
            color: #0f5132;
            border: 1px solid #a7e1d4;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f1aeb5;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .instructions {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 13px;
            color: #666;
        }

        .instructions ol {
            padding-left: 20px;
            margin: 10px 0 0 0;
        }

        .instructions li {
            margin: 5px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 ChatForYou</h1>
        <p class="subtitle">QR 코드로 간편하게 로그인하세요</p>
        
        <div class="instructions" id="instructions">
            <strong>📱 로그인 방법</strong>
            <ol>
                <li>아래 구글 버튼을 클릭하세요</li>
                <li>구글 계정으로 로그인하세요</li>
            </ol>
        </div>
        
        <div id="firebaseui-auth-container"></div>
        <div class="spinner" id="loading-spinner"></div>
        <div id="status-message"></div>
    </div>

    <script src="config/config.js"></script>
    <script src="js/common/ajaxUtil.js"></script>
    <script src="static/js/login/qr/qrscan.js"></script>
</body>
</html>
