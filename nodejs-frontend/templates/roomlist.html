<!DOCTYPE html>
<html lang="ko">
<head>
  <base href="/chatforyou/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅방 리스트</title>

  <!-- 외부 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">

  <!-- 내부 CSS -->
  <link rel="stylesheet" href="static/css/chatroom/common.css">
</head>
<body class="body-roomlist d-flex">
  <!-- 왼쪽 사이드바 -->
  <aside class="sidebar text-white">
    <div class="logo text-center d-flex justify-content-between">
      <img src="static/images/logo/chatforyou_logo_v2.svg" alt="ChatForYou Logo"/>
      <span class="noti_wrap">
        <i class="ic_bell"></i>
        <em class="new"></em>
      </span>
    </div>

    <div class="user-card">
      <span class="user-card__thumb"></span>

      <div class="user-card__info">
        <p class="user-card__name">닉네임입니다.</p>
        <span class="user-card__email">user@email.com</span>
      </div>
    </div>

    <div class="divider"></div>

    <nav class="nav flex-column">
      <a href="#" class="nav_link"><i class="ic_home"></i>홈</a>
      <a href="#" class="nav_link on"><i class="ic_list"></i>채팅방 리스트</a>
      <a href="#" class="nav_link"><i class="ic_friend"></i>친구</a>
      <a href="#" class="nav_link"><i class="ic_setting"></i>설정</a>
    </nav>

    <div class="sidebar-footer mt-auto pt-3 border-secondary text-center">
      <button id="logoutBtn" class="btn btn-logout display-none">
        <i></i> 로그아웃
      </button>
      <button id="loginBtn" class="btn btn-logout display-none">
        <i></i> 로그인
      </button>
    </div>
  </aside>

  <!-- 메인 콘텐츠 -->
  <main class="flex-grow-1 p-4">
    <div class="container-fluid">
      <div class="d-flex align-items-center mb-3">
        <div class="visitor-count" id="visitorCount"></div>
      </div>

      <div class="search_wrap d-flex justify-content-between">
        <div class="input_search">
          <input type="search" placeholder="채팅방 찾기">
          <i></i>
        </div>

        <div class="button-group">
          <button class="btn btn-custom-primary display-none" id="showUpdatesButton">업데이트 내역 확인하기</button>
          <button class="btn btn-custom-info" data-bs-toggle="modal" data-bs-target="#roomModal">방 만들기</button>
        </div>
      </div>

      <div class="card_wrap d-flex">
        <div class="card_info justify-content-between on">전체 <span>24</span></div>
        <div class="card_info justify-content-between">실시간 채팅방 <span>24</span></div>
        <div class="card_info justify-content-between">친구가 만든 방 <span>24</span></div>
      </div>

      <div class="table_wrap">
        <table class="table table-hover table-scroll" id="table">
          <thead>
            <tr>
              <th scope="col">채팅방명</th>
              <th scope="col">잠금 여부</th>
              <th scope="col">참여 인원</th>
              <th scope="col">채팅 종류</th>
              <th scope="col">채팅방 설정</th>
            </tr>
          </thead>
          <tbody id="roomTableBody">
            <!-- JS에서 동적으로 렌더링 -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <!-- Script -->
  <script src="config/config.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script src="js/roomlist/bootstrap-show-password.min.js"></script>
  <script src="js/roomlist/roomlist.js"></script>
  <script src="js/common/ajaxUtil.js"></script>
  <script src="js/popup/popup-loader.js"></script>
  <script src="js/common/common.js"></script>

  <script>
    $(document).ready(function () {
      PopupLoader.loadPopup('room', 'room_popup');
      PopupLoader.loadPopup('room_settings', 'room_settings_popup');
      PopupLoader.loadPopup('announcement', 'announcement_popup');
    });
  </script>
</body>
</html>
